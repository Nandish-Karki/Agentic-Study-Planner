# Render.com blueprint — managed deploy (BUILD_PLAN deploy).
# Create a new Blueprint on render.com pointing at this repo, then set the secret
# env vars (GITHUB_TOKEN / GROQ_API_KEY / SMTP_*) in the dashboard after.
#
# Pick a EU region for GDPR residency (frankfurt).
#
# ── This file is the FREE tier (Path A) ──────────────────────────────────────
# Render background WORKERS are not free, so we run the 5-agent crew INLINE in the
# API (JOB_MODE=eager) and drop the separate worker + Redis. Trade-off: a plan
# request blocks for the 1-2 min the crew takes, and the free web service sleeps
# after 15 min idle (cold start on the next visit). Free Postgres is deleted after
# 30 days. Fine for a demo; not for sustained traffic.
#
# To upgrade to production (Path B): add back a `type: keyvalue` Redis service and
# a `type: worker` service (dockerCommand: python -m study_planner.worker), set
# JOB_MODE=rq + REDIS_URL on BOTH the api and worker, and pay for the worker
# instance. See git history / DEPLOY.md for the rq topology.

databases:
  - name: study-planner-db
    region: frankfurt
    plan: free
    postgresMajorVersion: "16"

services:
  # API (web) — runs the crew inline (eager); no separate worker/Redis on free.
  - type: web
    name: study-planner-api
    runtime: docker
    region: frankfurt
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: JOB_MODE
        value: eager
      - key: DATABASE_URL
        fromDatabase:
          name: study-planner-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false   # set to your frontend URL, e.g. https://study-planner.vercel.app
      - key: LLM_PROVIDER
        value: mixed
      - key: GITHUB_TOKEN
        sync: false   # set in dashboard (LLM key)
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false   # optional rate-limit fallback
      # Email (verification + password reset). On Render's free tier outbound SMTP
      # is blocked ("[Errno 101] Network is unreachable"), so use RESEND_API_KEY —
      # mail then goes out over HTTPS. Set SMTP_FROM to a Resend-verified sender.
      # (SMTP_* below are only used when RESEND_API_KEY is unset — e.g. local dev.)
      - key: RESEND_API_KEY
        sync: false   # set in dashboard — preferred transport on Render
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_STARTTLS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: APP_BASE_URL
        sync: false   # your frontend URL, so verify/reset links open the SPA

# NOTE: Render's connection string is `postgresql://…`; the app auto-rewrites it to
# the async driver (`postgresql+asyncpg://…`) in config.py, so no manual prefix
# needed. After the first deploy, set ALLOWED_ORIGINS + APP_BASE_URL to your
# frontend URL and add the LLM + SMTP secrets in the dashboard. See DEPLOY.md.
