profile_task:
  description: >
    Read the student's CV ({data_dir}/cv.pdf) and transcript
    ({data_dir}/transcript.pdf) using read_document.
    Produce a compact student profile:
    1. Programme and current status (semester, credits earned so far)
    2. Completed modules: name, grade, credit points (CP) — as a table
    3. Demonstrated technical skills (from CV work experience + projects)
    Use only facts from the two documents. Under 300 words.
  expected_output: >
    Student profile with completed-modules table and skills list. Under 300 words.
  agent: profile_analyst

career_task:
  description: >
    Read the career path document ({data_dir}/career.pdf) using read_document.
    State the target role, then list the required competencies ranked by
    importance, split into must-have and nice-to-have. Under 200 words.
  expected_output: >
    Target role + ranked must-have and nice-to-have skill lists. Under 200 words.
  agent: career_analyst

modules_task:
  description: >
    Read the module handbook ({data_dir}/module_handbook.pdf) using read_document.
    If truncated, use search_document with the full path to retrieve the
    remaining modules, e.g. "Machine Learning::{data_dir}/module_handbook.pdf".

    Produce TWO Markdown tables and nothing else:

    Table 1 — Module catalog, one row per selectable module:
    | Module | CP | Semester offered | Key skills taught | Prerequisites | Thematic Area |
    Fill "Thematic Area" from the subject area or category the module belongs to
    in the handbook (e.g. "Fundamentals of Data Science"). Write "n/a" if not stated.
    List only modules that actually appear in the handbook. Do not editorialise.

    {area_names}
    The block above (when present) lists the ONLY valid strings for the "Thematic Area"
    column. Copy them character-by-character — no abbreviations, no variants.

    {requirements}

    Table 2 — Area CP budgets:
    | Thematic Area | Min CP | Max CP |
    IMPORTANT: If AUTHORITATIVE PROGRAMME RULES are given above (the block starting
    "AUTHORITATIVE PROGRAMME RULES"), copy the Min CP and Max CP values EXACTLY from
    that block — do NOT look at the module handbook for these numbers.
    If no authoritative rules are given, extract the ranges from the handbook's
    thematic-area rules section.
    WARNING: Do NOT use any semester-distribution table (e.g. "Semester 1 (WS): 15–18 CP",
    Regelstudienplan, or recommended study plan) as the source of Min/Max CP. Those
    describe semester load, not thematic-area budgets. Omit rows where no explicit
    per-area range is given.
  expected_output: >
    Two Markdown tables: (1) complete module catalog with Thematic Area column using
    only the exact area name strings provided, (2) area CP budget table listing Min CP
    and Max CP per thematic area.
  agent: module_curator

plan_task_v2:
  description: >
    Create the personalized semester-wise study plan using the information provided below.

    {correction}

    STUDENT PROFILE (completed modules, credit points, demonstrated skills):
    {profile_summary}

    TARGET CAREER AND SKILL GAPS:
    {career_summary}

    {gap_summary}

    MODULES AVAILABLE TO PLAN — grouped by thematic area with CP budget remaining.
    These have been Python-curated: area names are authoritative, already-completed
    modules are removed, each module appears at most once.
    {available_modules}

    RULES (all are hard constraints — violating any produces a broken plan):
    - Use ONLY modules listed above — never invent a module name
    - Each module may appear at most ONCE in the entire plan across all semesters
      unless its Prerequisites column says it may be taken more than once
    - Do NOT add modules to an area marked AREA FULL in its budget line
    - Cover the highest-priority skill gaps first when choosing between modules
    - Aim for roughly 30 CP per semester; respect prerequisites and semester offerings
    {requirements}
    {completed_status}
    The ALREADY-COMPLETED CREDITS block above (when present) is authoritative — use
    its exact "plan EXACTLY N more coursework CP" figure. Do not plan more than that
    total. Schedule the Master's Thesis (30 CP) as its own final semester after all
    coursework. Student constraints (CAP, not a target to fill): {constraints}

    SEMESTER LABELLING — use seasonal names only, no numbers:
    - The first planned semester is {current_semester}.
    - Alternate Summer/Winter from there (Summer Semester YYYY → Winter Semester YYYY/YYYY+1 → ...).
    - Do NOT write "Semester 1", "Semester 2", "1st Semester", etc. — only the seasonal name.

    OUTPUT — all three sections are required:
    1. **Summary** (2-3 sentences: where the student is, where they are heading)
    2. **Semester plans** — one subsection per remaining semester, headed by its seasonal name
       (e.g. ### Summer Semester 2026):
       | Module | CP | Thematic Area | Closes gap | Why |
       followed by **Total CP: N** after each semester table.
       Fill "Thematic Area" with the EXACT area heading the module is listed under in
       MODULES AVAILABLE TO PLAN above. If the module came from the "Other / Area
       Unknown" group (or you are not sure which area it belongs to), write
       "Unsure - verify" in that column.
    3. **Gaps not covered by any module** (and how to address them outside coursework)
    Do NOT output a thematic-area budget/summary table — the app computes and shows a
    verified one in code. Just schedule the modules correctly in section 2.
  expected_output: >
    A Markdown study plan with all three sections: (1) 2-3 sentence summary, (2) one
    subsection per semester with a module table (Module | CP | Thematic Area | Closes
    gap | Why, with Thematic Area copied from the area heading or "Unsure - verify")
    and a Total CP line, (3) uncovered-gaps section. No area budget/summary table.
  agent: study_planner

gap_task:
  description: >
    Compare the student profile against the career requirements.
    Produce:
    1. Strengths already covered (bullets, one line each)
    2. Skill gaps in priority order (numbered, one line each, tied to the
       career must-haves)
    Under 200 words.
  expected_output: >
    Strengths list + prioritized skill-gap list. Under 200 words.
  agent: gap_analyst
  context:
    - profile_task
    - career_task

plan_task:
  description: >
    Create the personalized semester-wise study plan. Use the student profile,
    career requirements, module catalog, and skill gaps. Rules:
    - Use ONLY modules from the curator's module table — never invent modules
    - Do not include modules the student has already completed (check the transcript table)
    - Aim for roughly 30 ECTS per semester; respect prerequisites and semester offerings
    - Cover the highest-priority skill gaps first
    - Respect the per-area CP budget: the credits ALREADY COMPLETED in an area plus
      the credits you newly plan for it must fall within that area's Min CP–Max CP
      range. Show the running area totals (completed + planned) in the Thesis/electives
      section.
    - Plan ONLY the remaining credits: subtract what the student has already completed
      in each area (from the transcript), then plan just enough new modules to reach
      each area's minimum and the coursework total. Use as few semesters as the
      remaining credits need — do NOT pad to a fixed number of semesters — then the thesis.
    {requirements}
    {completed_status}
    The ALREADY-COMPLETED CREDITS block above (when present) is computed in code and
    is authoritative — use its exact "plan EXACTLY N more coursework CP" figure and
    per-area room. Do NOT plan more than that total, and do NOT exceed any area's
    maximum. Schedule the Master's Thesis as its own final semester.
    - Student constraints (honor these as a CAP, not a target to fill): {constraints}
    Output sections:
    1. **Summary** (2-3 sentences: where the student is, where they're heading)
    2. **Semester plans** — one subsection per remaining semester with a table:
       | Module | CP | Closes gap | Why |
       and the semester's total CP
    3. **Thesis/electives advice** (2-3 sentences if applicable)
    4. **Gaps not covered by any module** (and how to close them outside coursework)
  expected_output: >
    A complete Markdown study plan with: (1) summary paragraph, (2) per-semester
    module tables with Module | CP | Closes gap | Why columns and total CP per
    semester, (3) a thematic area budget table — Area | Completed CP | Planned CP |
    Total | Min | Max — confirming every area falls within its allowed range,
    (4) uncovered-gaps section.
  agent: study_planner
  context:
    - profile_task
    - career_task
    - modules_task
    - gap_task
